name: Selene Staging Deploy CI/CD

on:
  push:
    branches:
      - main
      - staging

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: selene_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Checkout Code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python environment
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Install Backend Dependencies
      - name: Install backend requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest


      # 4. Run Backend Tests
      - name: Run Pytest suite
        env:
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/selene_test
          SECRET_KEY: test-secret-key-for-jwt-and-signing
          FLASK_ENV: testing
        run: |
          pytest backend/test_backend.py


      # 5. Setup Node.js environment
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 6. Install Frontend Dependencies & Build
      - name: Build Frontend Assets
        run: |
          cd frontend
          npm install
          npm run build

  deploy-staging:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'
    env:
      STAGING_HOST: ${{ secrets.STAGING_HOST }}
      STAGING_USER: ${{ secrets.STAGING_USER }}
      STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Example deploy step: Deploying via SSH & Rsync
      - name: Deploy to Remote Staging Host
        if: env.STAGING_HOST != ''
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.STAGING_HOST }}
          username: ${{ env.STAGING_USER }}
          key: ${{ env.STAGING_SSH_KEY }}
          source: "."
          target: "/var/www/selene"

      # Trigger deployment hook or restart app server
      - name: Restart Gunicorn Server
        if: env.STAGING_HOST != ''
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.STAGING_HOST }}
          username: ${{ env.STAGING_USER }}
          key: ${{ env.STAGING_SSH_KEY }}
          script: |
            cd /var/www/selene
            source venv/bin/activate
            pip install -r backend/requirements.txt
            cd backend
            FLASK_APP=app.py flask db upgrade
            sudo systemctl restart selene



