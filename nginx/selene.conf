# Selene Nginx Production Configuration

# HTTP - Redirect all traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name selene.local; # Replace with production domain name

    # Global redirect to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS - SSL Termination and Reverse Proxy
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name selene.local; # Replace with production domain name

    # SSL Certificate Paths
    ssl_certificate /etc/ssl/certs/selene.crt;
    ssl_certificate_key /etc/ssl/private/selene.key;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

    # SSL Session cache settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Diffie-Hellman parameter for DHE ciphers (highly recommended)
    # ssl_dhparam /etc/ssl/certs/dhparam.pem;

    # Security Headers (Defense in Depth)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://selene.local; img-src 'self' data:; frame-ancestors 'none'; form-action 'self';" always;

    # Access and Error Logs
    access_log /var/log/nginx/selene.access.log;
    error_log /var/log/nginx/selene.error.log warn;

    # Route frontend requests to Vite dev server or static assets
    location / {
        proxy_pass http://127.0.0.1:5173; # Proxy to Vite dev server (or root /var/www/selene for built static assets)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Route backend API requests to Flask Gunicorn/UWSGI server
    location /api/ {
        proxy_pass http://127.0.0.1:5000; # Forward requests to Flask/Gunicorn app server
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
